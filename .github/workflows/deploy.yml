name: CI — unit tests → deploy → mabl E2E → report

# Agentic quality pipeline for Galaxy Explorer.
#   1. unit-test : Claude-authored Vitest suite (dev-QA layer) — gates everything
#   2. deploy    : publish the static site to GitHub Pages (official actions)
#   3. e2e       : mabl deployment event via the official run-mabl-tests Action
#                  (independent verification layer; results appear as a PR check
#                   when the mabl bot GitHub app is installed)
#   4. report    : on mabl failure, file a Jira bug (SUP) + Slack alert
#
# See docs/MABL-AGENTIC-CICD-SETUP.md for the full setup guide + manual steps.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Unit tests (dev-QA layer) — must pass before we deploy ──────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── 2. Deploy the static site to GitHub Pages (official actions) ───
  #     Requires: repo Settings → Pages → Source = "GitHub Actions".
  deploy:
    needs: unit-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'            # static app lives at repo root
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── 3. mabl E2E (independent verification layer) ──────────────────
  #     Official Action triggers a mabl deployment event and polls to completion.
  #     Auto-passes github.sha → enables the mabl PR check (via mabl bot app).
  #     A plan only runs if it matches app/env + the "ci" label (CASE-SENSITIVE),
  #     is active, has ≥1 test enabled, AND has the deployment trigger toggled ON.
  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      # NOTE: confirm exact input names against the marketplace README:
      # https://github.com/marketplace/actions/run-mabl-tests
      - name: Run mabl tests
        uses: mablhq/mabl-tests-action@v1
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}   # MUST be a "CI/CD integration" key type
        with:
          application-id: ${{ secrets.MABL_APPLICATION_ID }}
          environment-id: ${{ secrets.MABL_ENVIRONMENT_ID }}
          plan-labels: ci
          # browser-types: chrome            # optional override
          # continue-on-failure: false       # default: fail the job (and PR check) on any test failure

  # ── 4. Report failures → Jira (SUP) + Slack ───────────────────────
  #     Only runs when the mabl E2E job failed. Demo tickets are clearly
  #     marked and land in the Damien-approved SUP project.
  report-failure:
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create Jira issue (SUP)
        run: |
          AUTH=$(echo -n "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" | base64 -w 0)
          SHA_SHORT=$(echo '${{ github.sha }}' | cut -c1-8)
          SUMMARY="[Galaxy Explorer DEMO] mabl E2E failure @ ${SHA_SHORT}"
          BODY="Automated mabl E2E suite failed after deploying to GitHub Pages.\n\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}\n*Actor:* ${{ github.actor }}\n*Workflow run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*Reproduction:* open https://ryan-cse.github.io/galaxy-explorer-demo/?demo=true and run the 'Favorites only' flow."
          curl -sf -X POST \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"project\": {\"key\": \"${{ secrets.JIRA_PROJECT_KEY }}\"},
                \"summary\": \"$SUMMARY\",
                \"issuetype\": {\"name\": \"Bug\"},
                \"labels\": [\"galaxy-explorer\", \"demo\", \"mabl\", \"ci\"],
                \"description\": {
                  \"version\": 1, \"type\": \"doc\",
                  \"content\": [{\"type\": \"paragraph\", \"content\": [{\"type\": \"text\", \"text\": \"$BODY\"}]}]
                }
              }
            }"

      - name: Send Slack alert
        # Auto-skips if no webhook secret is set, so missing Slack perms don't break the job.
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SHA_SHORT=$(echo '${{ github.sha }}' | cut -c1-8)
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":x: *Galaxy Explorer — mabl E2E failure* (`'"$SHA_SHORT"'`)",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "GitHub Actions", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": true}
                ]
              }]
            }'
